controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    scissor_position_controller:
      type: forward_command_controller/ForwardCommandController

scissor_position_controller:
  ros__parameters:
    joints:
      - bottom_stud_joint
      - top_stud_joint
      - left_joint1
      - right_joint1
      - left_joint2
      - right_joint2
      - left_joint3
      - right_joint3
      - left_joint4
      - right_joint4
      - left_joint5
      - right_joint5
      - left_joint6
      - right_joint6
      - camera_joint
    interface_name: position
