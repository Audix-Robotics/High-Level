# Per-robot parameter overrides

robots:
  robot_0:
    assigned_lane: 0

  robot_1:
    assigned_lane: 1

  robot_2:
    assigned_lane: 2

  robot_3:
    assigned_lane: 3

  robot_4:
    assigned_lane: 4

  robot_5:
    assigned_lane: 5

fleet:
  collision_buffer: 0.5
  lane_margin: 0.3
  waypoint_tolerance: 0.05
  yaw_tolerance_deg: 5.0
  reroute_on_other_robot: false