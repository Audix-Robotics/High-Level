mission_controller:
  ros__parameters:
    # --- Waypoints: [x, y, yaw_rad, lift_height_m] ---
    # 3 targets (excluding home) as required by rubric
    # Flat list: [x, y, yaw_rad, lift_height_m,  x, y, yaw_rad, lift_height_m, ...]
    waypoints: [1.5, 0.5, 1.5708, 0.10,  3.0, -0.5, 0.0, 0.20,  4.5, 0.5, -1.5708, 0.30]

    # --- Obstacle avoidance ---
    safe_distance: 0.25            # m — trigger threshold for front sensors
    side_safe_distance: 0.15       # m — trigger threshold for side sensors
    static_persistence_cycles: 12  # scans before classifying as static
    reroute_lateral_offset: 0.35   # m — strafe offset to bypass static obstacle
    dynamic_clear_cycles: 5        # consecutive clear readings to resume

    # --- Scissor lift ---
    lift_dwell_time: 3.0           # seconds to hold at scan height
    lift_position_tolerance: 0.003 # m — when to consider lift at target

    # --- Navigation tuning ---
    linear_kp: 0.5
    angular_kp: 1.5
    max_linear_speed: 0.3          # m/s
    max_angular_speed: 1.0         # rad/s
    position_tolerance: 0.05       # m
    angle_tolerance: 0.05          # rad

mecanum_kinematics:
  ros__parameters:
    wheel_radius: 0.0485           # m
    wheel_base_half: 0.09          # m  (half front-to-back axle distance)
    track_width_half: 0.1574       # m  (half left-to-right wheel distance)

start_stop_node:
  ros__parameters:
    auto_start: true
    start_delay: 6.0               # seconds after launch

