mission_controller:
  ros__parameters:
    waypoints: [0.0, -2.4, 0.0, 0.25, 0.0, 0.0, 3.14159, 0.25, 0.0, 2.4, 0.0, 0.25]
    obstacle_speed_full: 0.30
    obstacle_speed_slow: 0.18
    obstacle_speed_creep: 0.08
    obstacle_detect_distance: 0.25
    obstacle_clear_distance: 0.25
    obstacle_danger_distance: 0.25
    obstacle_side_min: 0.15
    front_blocked_threshold: 3
    clear_threshold: 5
    reroute_strafe_speed: 0.24
    reroute_creep_speed: 0.18
    reroute_lateral_distance: 0.42
    reroute_advance_distance: 0.45
    reroute_return_lookahead: 0.18
    reroute_rejoin_extra_distance: 0.30
    reroute_side_clearance: 0.20
    reroute_side_clear_hysteresis: 0.03
    reroute_side_clear_cycles: 6
    obstacle_memory_clear_cycles: 6
    obstacle_halt_timeout: 3.0
    obstacle_safety_margin: 0.06
    obstacle_path_corridor_margin: 0.03
    obstacle_envelope_cone_gain: 0.60
    reroute_return_tolerance: 0.05
    obstacle_return_tolerance: 0.02
    reroute_timeout: 20.0
    reroute_wall_follow_distance: 0.70
    reroute_rotation_search_angle_deg: 55.0
    reroute_rotation_clear_distance: 0.28
    reroute_rotation_max_attempts: 2
    obstacle_sensor_warmup_sec: 2.0
    ir_filter_alpha_rise: 0.18
    ir_filter_alpha_fall: 0.70
    optimized_rejoin_min_lookahead: 0.04
    optimized_rejoin_lateral_gain: 0.35
    lift_dwell_time: 2.0
    lift_position_tolerance: 0.003
    lift_motion_time: 2.0
    linear_kp: 0.5
    angular_kp: 1.5
    scan_angle_tolerance: 0.12
    scan_rotation_kp_scale: 1.6
    scan_rotation_min_speed: 0.25
    scan_rotation_max_speed: 1.0
    max_linear_speed: 0.3
    max_angular_speed: 1.0
    position_tolerance: 0.05
    angle_tolerance: 0.08
    scan_turn_degrees: 90.0
    scan_turn_direction: left
    scripted_skid_scan_mode: false
    skid_lateral_distance: 0.6
    end_goal_distance: 4.0
    scan_use_lift: true
    straight_line_only: false
    straight_line_distance: 7.2
    straight_line_lift_height: 0.271
    enable_obstacle_avoidance: true
    enable_stop_scan: true
    repulse_decay_sec: 0.5
    status_log_to_terminal: true
    status_log_period_sec: 0.5
    debug_visualization: true
    debug_path_point_spacing: 0.03
    debug_path_max_points: 2500
    robot_center_offset_x: 0.0
    robot_center_offset_y: 0.0
    cmd_linear_accel_limit: 0.9
    cmd_linear_decel_limit: 1.8
    cmd_lateral_accel_limit: 1.1
    cmd_lateral_decel_limit: 2.2
    cmd_angular_accel_limit: 2.8
    cmd_angular_decel_limit: 4.5
    cmd_forward_sign: -1.0   # Robot forward is -X in URDF frame
    cmd_lateral_sign: 1.0    # Lateral sign matches body frame convention

mecanum_kinematics:
  ros__parameters:
    wheel_radius: 0.0485
    wheel_base_half: 0.09
    track_width_half: 0.1574
    robot_body_frame_flip_180: true
    invert_linear_x: true    # MUST be true — works with cmd_forward_sign: -1.0
    publish_odom: false

start_stop_node:
  ros__parameters:
    auto_start: true
    start_delay: 6.0

arena_roamer:
  ros__parameters:
    waypoints: [0.0, -2.4, 0.0, 0.30, 0.0, 0.0, 3.14159, 0.60, 0.0, 2.4, 0.0, 0.90]
    lift_dwell_time: 3.0
    debug_frame_id: odom
    cmd_forward_sign: -1.0
    cmd_lateral_sign: 1.0
    route_fail_on_timeout: false
    goal_timeout_sec: 60.0
    route_waypoint_tolerance: 0.05
    route_waypoint_dwell_sec: 0.5
    obstacle_detect_distance: 0.25
    obstacle_danger_distance: 0.25
    obstacle_clear_distance: 0.25
    max_linear_speed: 0.3
    max_lateral_speed: 0.3
    max_angular_speed: 1.6
    wall_influence_distance: 0.0
    arena_min_x: -5.0
    arena_max_x: 10.0
    arena_min_y: -4.0
    arena_max_y: 4.0
    control_mode: acceptance_path
    robot_body_frame_flip_180: true
    scan_turn_degrees: 90.0
    scan_directions: right,left,right
    robot_center_offset_x: 0.0
    robot_center_offset_y: 0.0

